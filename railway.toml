# Web service: in Railway dashboard set Build → Dockerfile path to `Dockerfile`
# (do not set dockerfilePath here — it would apply to every service and break
# the Valsea service, which must use `Dockerfile.valsea` or RAILWAY_DOCKERFILE_PATH).
#
# Valsea proxy: second service, Dockerfile path `Dockerfile.valsea`. See RAILWAY.md.

[build]
watchPatterns = [
  "src/**",
  "public/**",
  "package.json",
  "package-lock.json",
  "next.config.ts",
  "postcss.config.mjs",
  "tsconfig.json",
]
